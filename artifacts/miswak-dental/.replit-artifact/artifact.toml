kind = "web"
previewPath = "/"
title = "Miswak Dental Hospital"
version = "1.0.0"
id = "artifacts/miswak-dental"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19542

[services.development]
run = "pnpm --filter @workspace/miswak-dental run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/miswak-dental", "run", "build" ]
publicDir = "artifacts/miswak-dental/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19542"
BASE_PATH = "/"
